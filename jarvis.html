<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --cyan: #00f5ff;
    --cyan-dim: #00a8b5;
    --red: #ff2244;
    --gold: #ffc300;
    --bg: #020b12;
    --panel: rgba(0,20,35,0.85);
    --border: rgba(0,245,255,0.18);
    --text: #c8f0f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 8s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,60,90,0.35) 0%, transparent 70%);
    pointer-events: none;
  }
  @keyframes gridPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px 10px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,10,20,0.9);
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900; font-size: 1.5rem;
    letter-spacing: 0.25em; color: var(--cyan);
    text-shadow: 0 0 18px var(--cyan), 0 0 40px rgba(0,245,255,0.3);
  }
  .logo span { color: var(--gold); }
  .status-row {
    display: flex; gap: 14px; align-items: center;
    font-size: 0.68rem; letter-spacing: 0.12em; color: var(--cyan-dim);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
    animation: blink 2s ease-in-out infinite;
  }
  .dot.listening { background: #00ff88; box-shadow: 0 0 12px #00ff88; animation: blink 0.8s linear infinite; }
  .dot.thinking  { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: blink 0.35s linear infinite; }
  .dot.speaking  { background: #aa44ff; box-shadow: 0 0 10px #aa44ff; animation: blink 0.5s ease-in-out infinite; }
  .dot.off       { background: #333; box-shadow: none; animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* mic ripple */
  #mic-ring {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 80px; z-index: 20;
    display: none; align-items: center; justify-content: center;
  }
  #mic-ring.show { display: flex; }
  #mic-ring::before, #mic-ring::after {
    content: ''; position: absolute; border-radius: 50%;
    border: 2px solid #00ff88;
    animation: ripple 1.4s ease-out infinite;
  }
  #mic-ring::after { animation-delay: 0.7s; }
  @keyframes ripple {
    0%   { width: 40px; height: 40px; opacity: 0.9; }
    100% { width: 80px; height: 80px; opacity: 0; }
  }
  #mic-icon { font-size: 1.6rem; z-index: 1; filter: drop-shadow(0 0 8px #00ff88); }

  #voice-banner {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.35);
    color: #00ff88; font-size: 0.72rem; letter-spacing: 0.15em;
    padding: 6px 20px; border-radius: 2px; z-index: 50;
    display: none; backdrop-filter: blur(4px);
  }
  #voice-banner.show { display: block; }

  main {
    position: relative; z-index: 5;
    flex: 1; display: flex; flex-direction: column;
    padding: 16px 24px 0; overflow: hidden;
  }

  #chat-log {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column; gap: 10px;
    padding-right: 6px; padding-bottom: 8px;
    scrollbar-width: thin; scrollbar-color: var(--cyan-dim) transparent;
  }
  #chat-log::-webkit-scrollbar { width: 4px; }
  #chat-log::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 2px; animation: fadeSlide 0.25s ease forwards; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .msg-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .msg.user .msg-label   { color: var(--gold); }
  .msg.jarvis .msg-label { color: var(--cyan); }

  .msg-bubble {
    padding: 9px 14px; border-radius: 2px 8px 8px 8px;
    font-size: 0.85rem; line-height: 1.55; max-width: 82%; position: relative;
  }
  .msg.user { align-items: flex-end; }
  .msg.user .msg-bubble {
    background: rgba(255,195,0,0.08); border: 1px solid rgba(255,195,0,0.2);
    border-radius: 8px 2px 8px 8px; color: #ffe58a;
  }
  .msg.jarvis .msg-bubble {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
  }
  .msg.jarvis .msg-bubble::before {
    content: ''; position: absolute; left: -1px; top: 0;
    width: 3px; height: 100%; background: var(--cyan);
    border-radius: 2px 0 0 2px; box-shadow: 0 0 8px var(--cyan);
  }

  .cursor {
    display: inline-block; width: 8px; height: 13px;
    background: var(--cyan); margin-left: 3px;
    animation: cursorBlink 0.6s step-end infinite;
    vertical-align: middle; box-shadow: 0 0 6px var(--cyan);
  }
  @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

  .sys-msg {
    font-size: 0.68rem; color: rgba(0,245,255,0.35);
    text-align: center; letter-spacing: 0.15em; padding: 4px 0;
  }

  #history-panel {
    position: fixed; right: -300px; top: 0; bottom: 0; width: 280px;
    background: rgba(0,8,18,0.97); border-left: 1px solid var(--border);
    z-index: 100; display: flex; flex-direction: column;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1); padding: 16px;
  }
  #history-panel.open { right: 0; }
  #history-panel h3 {
    font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
    letter-spacing: 0.2em; color: var(--cyan); margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  #history-list {
    flex: 1; overflow-y: auto; font-size: 0.72rem;
    line-height: 1.5; color: rgba(200,240,245,0.55);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .history-entry { padding: 6px 0; border-bottom: 1px solid rgba(0,245,255,0.06); }
  .history-entry .q { color: rgba(255,195,0,0.6); }
  .history-entry .a { color: rgba(0,245,255,0.5); margin-top: 2px; }

  footer {
    position: relative; z-index: 10;
    padding: 12px 24px 16px;
    background: rgba(0,10,20,0.92);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }

  #user-input {
    flex: 1; background: rgba(0,245,255,0.04);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 0.88rem; padding: 10px 14px;
    resize: none; min-height: 42px; max-height: 120px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s; line-height: 1.4;
  }
  #user-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.15), inset 0 0 8px rgba(0,245,255,0.04);
  }
  #user-input::placeholder { color: rgba(0,245,255,0.25); }

  .btn {
    font-family: 'Orbitron', sans-serif; font-size: 0.65rem;
    letter-spacing: 0.15em; padding: 10px 14px; border: 1px solid;
    border-radius: 4px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  #send-btn { background: rgba(0,245,255,0.08); border-color: var(--cyan); color: var(--cyan); }
  #send-btn:hover:not(:disabled) { background: rgba(0,245,255,0.18); box-shadow: 0 0 16px rgba(0,245,255,0.3); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #mic-btn {
    background: rgba(0,255,136,0.06); border-color: rgba(0,255,136,0.4);
    color: #00ff88; font-size: 1rem; padding: 8px 16px; letter-spacing: 0;
  }
  #mic-btn:hover { background: rgba(0,255,136,0.15); box-shadow: 0 0 16px rgba(0,255,136,0.3); }
  #mic-btn.active { background: rgba(0,255,136,0.2); border-color: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.5); }

  #stop-btn { background: rgba(255,34,68,0.08); border-color: var(--red); color: var(--red); display: none; }
  #stop-btn.visible { display: block; }
  #stop-btn:hover { background: rgba(255,34,68,0.2); }

  #hist-btn { background: rgba(255,195,0,0.06); border-color: rgba(255,195,0,0.4); color: var(--gold); }
  #hist-btn:hover { background: rgba(255,195,0,0.14); }

  #clear-btn { background: transparent; border-color: rgba(255,34,68,0.3); color: rgba(255,34,68,0.5); font-size: 0.6rem; }
  #clear-btn:hover { border-color: var(--red); color: var(--red); }

  .btn-row-2 { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }

  .corner { position: fixed; width: 60px; height: 60px; z-index: 6; opacity: 0.35; }
  .corner.tl { top:0; left:0; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner.tr { top:0; right:0; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
  .corner.bl { bottom:0; left:0; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner.br { bottom:0; right:0; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }

  #overlay { display:none; position:fixed; inset:0; z-index:99; background:rgba(0,0,0,0.4); }
  #overlay.show { display:block; }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="overlay" onclick="closeHistory()"></div>
<div id="voice-banner">🎤 EN ÉCOUTE — DIS "JARVIS"</div>
<div id="mic-ring"><span id="mic-icon">🎤</span></div>

<div id="history-panel">
  <h3>▸ HISTORIQUE CONV.</h3>
  <div id="history-list"></div>
</div>

<header>
  <div class="logo">J.<span>A</span>.R.V.I.S</div>
  <div class="status-row">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">EN LIGNE</span>
    <span style="color:rgba(0,245,255,0.2)">|</span>
    <span id="model-label">claude-sonnet-4-6</span>
  </div>
</header>

<main>
  <div id="chat-log">
    <div class="sys-msg">◈ SYSTÈME INITIALISÉ — JARVIS V3.2 ◈</div>
  </div>
</main>

<footer>
  <div class="input-row">
    <textarea id="user-input" placeholder='Dis "Jarvis" ou tape ta question...' rows="1"></textarea>
    <button class="btn" id="mic-btn" onclick="toggleVoice()" title="Activer écoute vocale">🎤</button>
    <button class="btn" id="send-btn" onclick="sendMessage()">ENVOYER ▶</button>
    <button class="btn" id="stop-btn" onclick="stopAll()">■ STOP</button>
  </div>
  <div class="btn-row-2">
    <button class="btn" id="hist-btn" onclick="toggleHistory()">◧ HISTORIQUE</button>
    <button class="btn" id="clear-btn" onclick="clearHistory()">✕ EFFACER HIST.</button>
  </div>
</footer>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const HISTORY_KEY = 'jarvis_conv_history';
const MAX_HISTORY = 20;
let abortFlag    = false;
let isGenerating = false;
let isSpeaking   = false;
let voiceActive  = false;
let recognition  = null;
let listenTimer  = null;

// ═══════════════════════════════════════════════════════
//  HISTORY — puter.kv
// ═══════════════════════════════════════════════════════
async function loadHistory() {
  try { const r = await puter.kv.get(HISTORY_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
async function saveHistory(h) {
  try { await puter.kv.set(HISTORY_KEY, JSON.stringify(h.slice(-MAX_HISTORY))); }
  catch(e) { console.warn('KV:', e); }
}
async function clearHistory() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  try { await puter.kv.del(HISTORY_KEY); } catch {}
  addSysMsg('◈ HISTORIQUE EFFACÉ ◈');
  renderHistoryPanel([]);
}

// ═══════════════════════════════════════════════════════
//  TTS — voix robotique mâle
// ═══════════════════════════════════════════════════════
let voicesLoaded = [];
if (window.speechSynthesis) {
  const loadVoices = () => { voicesLoaded = window.speechSynthesis.getVoices(); };
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function pickVoice() {
  const v = voicesLoaded;
  // Cherche voix française male (Thomas sur macOS, par ex.)
  return v.find(x => x.lang.startsWith('fr') && /thomas|male|homme/i.test(x.name))
      || v.find(x => x.lang.startsWith('fr'))
      || v.find(x => /male|david|mark|george|richard/i.test(x.name))
      || v[0] || null;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  isSpeaking = true;
  setStatus('speaking');

  const utter = new SpeechSynthesisUtterance(text);
  const voice = pickVoice();
  if (voice) utter.voice = voice;
  utter.lang   = 'fr-FR';
  utter.pitch  = 0.5;   // très grave → robotique
  utter.rate   = 0.85;  // posé, comme Jarvis
  utter.volume = 1;

  utter.onend = () => {
    isSpeaking = false;
    setStatus('online');
    if (voiceActive && !isGenerating) setTimeout(startListening, 300);
  };
  utter.onerror = () => {
    isSpeaking = false;
    setStatus('online');
    if (voiceActive && !isGenerating) setTimeout(startListening, 300);
  };

  window.speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  isSpeaking = false;
}

// ═══════════════════════════════════════════════════════
//  SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function initRecognition() {
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'fr-FR';
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    const raw = e.results[0][0].transcript.trim().toLowerCase();
    console.log('🎤', raw);
    handleVoiceInput(raw);
  };
  r.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (voiceActive && !isSpeaking && !isGenerating) listenTimer = setTimeout(startListening, 200);
    } else {
      console.warn('STT:', e.error);
    }
  };
  r.onend = () => {
    if (voiceActive && !isSpeaking && !isGenerating) listenTimer = setTimeout(startListening, 200);
  };
  return r;
}

function startListening() {
  clearTimeout(listenTimer);
  if (!recognition) recognition = initRecognition();
  if (!recognition || isSpeaking || isGenerating) return;
  try {
    recognition.start();
    setVoiceBanner(true);
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-ring').classList.add('show');
    setStatus('listening');
  } catch(e) { /* already running */ }
}

function stopListening() {
  clearTimeout(listenTimer);
  setVoiceBanner(false);
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-ring').classList.remove('show');
  if (recognition) try { recognition.abort(); } catch {}
  setStatus('online');
}

function toggleVoice() {
  if (!SpeechRecognition) {
    alert('Reconnaissance vocale non disponible. Utilise Chrome ou Edge.');
    return;
  }
  voiceActive = !voiceActive;
  if (voiceActive) {
    addSysMsg('◈ ÉCOUTE VOCALE ACTIVÉE — DIS "JARVIS" ◈');
    startListening();
  } else {
    stopListening();
    addSysMsg('◈ ÉCOUTE VOCALE DÉSACTIVÉE ◈');
  }
}

function setVoiceBanner(on) {
  document.getElementById('voice-banner').classList.toggle('show', on);
}

function handleVoiceInput(raw) {
  if (!raw.includes('jarvis')) return; // ignorer si pas de mot-clé

  // Tout ce qui suit "jarvis" (avec variantes : "jarvis," "jarvis !")
  let question = raw.replace(/^.*?jarvis[,!?.]*\s*/i, '').trim();

  if (!question || question.length < 2) {
    // Juste "Jarvis" → "Oui monsieur"
    addUserBubble('Jarvis');
    addJarvisInstant('Oui monsieur ?');
    speak('Oui monsieur ?');
    return;
  }

  // Question réelle
  addUserBubble('Jarvis, ' + question);
  processQuery(question);
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'dot';
  const m = { listening:['listening','ÉCOUTE...'], thinking:['thinking','TRAITEMENT...'], speaking:['speaking','RÉPONSE VOCALE'], offline:['off','HORS LIGNE'] };
  if (m[state]) { dot.classList.add(m[state][0]); txt.textContent = m[state][1]; }
  else txt.textContent = 'EN LIGNE';
}

function addSysMsg(t) {
  const l = document.getElementById('chat-log');
  const d = document.createElement('div');
  d.className = 'sys-msg'; d.textContent = t;
  l.appendChild(d); scrollDown();
}

function addUserBubble(t) {
  const l = document.getElementById('chat-log');
  const w = document.createElement('div');
  w.className = 'msg user';
  w.innerHTML = `<div class="msg-label">VOUS</div><div class="msg-bubble">${escHtml(t)}</div>`;
  l.appendChild(w); scrollDown();
}

function addJarvisInstant(t) {
  const l = document.getElementById('chat-log');
  const w = document.createElement('div');
  w.className = 'msg jarvis';
  w.innerHTML = `<div class="msg-label">JARVIS</div><div class="msg-bubble">${escHtml(t)}</div>`;
  l.appendChild(w); scrollDown();
}

function createJarvisBubble() {
  const l = document.getElementById('chat-log');
  const w = document.createElement('div');
  w.className = 'msg jarvis';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bubble.appendChild(cursor);
  w.innerHTML = `<div class="msg-label">JARVIS</div>`;
  w.appendChild(bubble);
  l.appendChild(w); scrollDown();
  return { bubble, cursor };
}

function scrollDown() { const l = document.getElementById('chat-log'); l.scrollTop = l.scrollHeight; }
function escHtml(t)   { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ═══════════════════════════════════════════════════════
//  HISTORY PANEL
// ═══════════════════════════════════════════════════════
function toggleHistory() {
  document.getElementById('history-panel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
  loadHistory().then(renderHistoryPanel);
}
function closeHistory() {
  document.getElementById('history-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function renderHistoryPanel(h) {
  const el = document.getElementById('history-list');
  if (!h.length) { el.innerHTML = '<div style="opacity:.4;font-size:.7rem">Aucun historique.</div>'; return; }
  el.innerHTML = h.map(e => `<div class="history-entry">
    <div class="q">▶ ${escHtml(e.user.substring(0,80))}${e.user.length>80?'…':''}</div>
    <div class="a">${escHtml(e.assistant.substring(0,100))}${e.assistant.length>100?'…':''}</div>
  </div>`).join('');
}

// ═══════════════════════════════════════════════════════
//  BUILD MESSAGES
// ═══════════════════════════════════════════════════════
function buildMessages(history, userText) {
  const system = `Tu es JARVIS, l'IA de Tony Stark. Tu es concis, grave, légèrement formel.

CONTRAINTE ABSOLUE — LONGUEUR :
Chaque réponse = exactement 1 phrase. 2 phrases maximum si vraiment nécessaire. Jamais plus.
Ne commence JAMAIS par une formule de politesse. Va droit au fait.
Pas de listes. Pas de tirets. Pas d'astérisques. Juste une ou deux phrases simples.

Exemples CORRECTS :
- "La vitesse de la lumière est de 299 792 kilomètres par seconde."
- "Il est 14h32, monsieur."
- "Je ne dispose pas de cette information."

Exemples INCORRECTS (trop long) :
- "Bien sûr ! La vitesse de la lumière est... [phrase 2] ... [phrase 3]"

INTERDICTIONS ABSOLUES :
- Aucun emoji, aucun symbole (pas de 🔹, ✅, ⚡, etc.)
- Aucun caractère spécial hors ponctuation normale (. , ! ? :)
- Aucun astérisque, tiret, dièse, crochet
- Texte brut uniquement`;

  const messages = [];
  history.slice(-6).forEach(e => {
    messages.push({ role:'user', content:e.user });
    messages.push({ role:'assistant', content:e.assistant });
  });
  messages.push({ role:'user', content:userText });
  return { system, messages };
}

// ═══════════════════════════════════════════════════════
//  STOP
// ═══════════════════════════════════════════════════════
function stopAll() {
  abortFlag = true;
  stopSpeech();
}

// ═══════════════════════════════════════════════════════
//  PROCESS QUERY
// ═══════════════════════════════════════════════════════
async function processQuery(text) {
  if (isGenerating) return;
  isGenerating = true; abortFlag = false;

  if (voiceActive) stopListening();

  document.getElementById('send-btn').disabled = true;
  document.getElementById('stop-btn').classList.add('visible');
  setStatus('thinking');

  const history = await loadHistory();
  const { system, messages } = buildMessages(history, text);
  const { bubble, cursor } = createJarvisBubble();

  let fullText = '';
  const textNode = document.createTextNode('');
  bubble.insertBefore(textNode, cursor);

  try {
    const response = await puter.ai.chat(messages, {
      model: 'claude-sonnet-4-6',
      stream: true,
      system_prompt: system
    });

    for await (const part of response) {
      if (abortFlag) break;
      const token = part?.text || '';
      fullText += token;
      textNode.textContent = fullText;
      scrollDown();
    }
  } catch(err) {
    fullText = 'Erreur de connexion, monsieur.';
    textNode.textContent = fullText;
    console.error(err);
  } finally {
    cursor.remove();
    if (abortFlag && !fullText) fullText = '[Arrêté]';

    if (fullText && fullText !== '[Arrêté]') {
      history.push({ user: text, assistant: fullText });
      await saveHistory(history);
      speak(fullText);
    } else {
      if (voiceActive) setTimeout(startListening, 400);
    }

    isGenerating = false; abortFlag = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('stop-btn').classList.remove('visible');
    if (!isSpeaking) setStatus('online');
    scrollDown();
  }
}

// ═══════════════════════════════════════════════════════
//  SEND (bouton / Enter)
// ═══════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text || isGenerating) return;
  input.value = ''; autoResize(input);
  addUserBubble(text);
  processQuery(text);
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('user-input').addEventListener('input', function() { autoResize(this); });

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
(async () => {
  const history = await loadHistory();
  if (history.length) addSysMsg(`◈ ${history.length} échange(s) chargés depuis l'historique ◈`);
  if (!SpeechRecognition) addSysMsg('⚠ Reconnaissance vocale indisponible — utilise Chrome ou Edge');
  else addSysMsg('◈ CLIQUE 🎤 POUR ACTIVER LA VOIX ◈');
})();
</script>
