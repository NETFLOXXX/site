<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dernier lien Movix</title>
<style>
  body { font-family: sans-serif; text-align: center; margin-top: 100px; }
  button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
  #result { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>

<button onclick="getLatestUrl()">Obtenir le dernier lien Movix</button>
<div id="result"></div>

<script>
async function getLatestUrl() {
  const resultDiv = document.getElementById("result");
  resultDiv.textContent = "Chargement...";
  try {
    const res = await fetch("./latest.json?t=" + Date.now());
    const data = await res.json();
    if (data.url) {
      resultDiv.innerHTML = `<a href="${data.url}" target="_blank">${data.url}</a><br><small>Mis à jour: ${new Date(data.updated_at).toLocaleString()}</small>`;
    } else {
      resultDiv.textContent = "Aucun lien trouvé.";
    }
  } catch (e) {
    resultDiv.textContent = "Erreur: " + e.message;
  }
}
</script>

</body>
</html>
